<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I-EYE — Auditing & Management Solutions</title>
<style>
/* ── GOOGLE FONTS (system fallback if offline) ─────────── */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Montserrat:wght@300;400;600&display=swap');

/* ── RESET ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#2bbfb0;
  --teal-dk:#1a9e8e;
  --teal-dim:rgba(43,191,176,0.18);
  --navy:#070f1e;
  --navy2:#0d2040;
  --navy3:#101e38;
  --navy4:#142244;
  --border:rgba(43,191,176,0.2);
  --border2:rgba(43,191,176,0.1);
  --text:#ddeae8;
  --muted:#6a8d8a;
  --white:#fff;
  --gold:#f5a623;
  --green:#4dc47a;
  --red:#e05555;
  --orange:#ed7d31;
  --radius:10px;
  --radius-sm:7px;
  --shadow:0 6px 30px rgba(0,0,0,0.6);
}
html,body{height:100%;overflow:hidden;
  font-family:'Montserrat','Segoe UI',Arial,sans-serif;
  background:var(--navy);color:var(--text);font-size:13px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--navy2);}
::-webkit-scrollbar-thumb{background:var(--teal-dk);border-radius:2px;}

/* ── SHELL ─────────────────────────────────────────────── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ══════════════════════════════════════════════════════════
   SPLASH  (matches IEYE-Splash.html exactly)
══════════════════════════════════════════════════════════ */
.splash{
  min-height:100vh;
  background:radial-gradient(ellipse at 35% 25%,#1b3d60 0%,#0d2040 45%,#070f1e 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* Stars */
.splash::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1.5px 1.5px at 15% 20%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 8%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 75%,rgba(255,255,255,.1) 0%,transparent 100%),
    radial-gradient(2px 2px at 5% 85%,rgba(255,255,255,.12) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 55%,rgba(255,255,255,.08) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 40%,rgba(255,255,255,.06) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 60%,rgba(255,255,255,.1) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 30%,rgba(255,255,255,.07) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}
.splash-inner{
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:1;
  animation:fadeUp 1.4s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

/* Logo circle with rings */
.logo-circle-wrap{position:relative;width:300px;height:300px;margin-bottom:40px;}
.ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring-1{width:340px;height:340px;border:1px solid rgba(43,191,176,.08);}
.ring-2{width:380px;height:380px;border:1px solid rgba(43,191,176,.04);animation:ringsp 40s linear infinite;}
.ring-2::before{content:'';position:absolute;width:6px;height:6px;border-radius:50%;
  background:rgba(43,191,176,.5);top:-3px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 8px rgba(43,191,176,.8);}
@keyframes ringsp{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.logo-circle{
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.06) 0%,rgba(43,191,176,.03) 40%,transparent 70%);
  border:2px solid rgba(43,191,176,.3);
  box-shadow:0 0 50px rgba(43,191,176,.15),0 0 100px rgba(43,191,176,.06),inset 0 0 40px rgba(43,191,176,.04);
  display:flex;align-items:center;justify-content:center;
  position:relative;animation:pulseglow 4s ease-in-out infinite;overflow:hidden;
}
@keyframes pulseglow{
  0%,100%{box-shadow:0 0 50px rgba(43,191,176,.15),0 0 100px rgba(43,191,176,.06),inset 0 0 40px rgba(43,191,176,.04);}
  50%{box-shadow:0 0 70px rgba(43,191,176,.28),0 0 140px rgba(43,191,176,.1),inset 0 0 60px rgba(43,191,176,.08);}
}
.logo-img-splash{width:240px;height:240px;object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(43,191,176,.4));
  animation:floatLogo 6s ease-in-out infinite;}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* Brand text */
.splash-brand{
  font-family:'Rajdhani','Segoe UI',sans-serif;font-size:80px;font-weight:700;
  color:#fff;letter-spacing:8px;line-height:1;text-align:center;
  text-shadow:0 0 30px rgba(43,191,176,.35),0 2px 20px rgba(0,0,0,.5);
  animation:fadeUp 1.4s .25s cubic-bezier(.22,1,.36,1) both;
}
.splash-brand .dash{color:#2bbfb0;text-shadow:0 0 20px rgba(43,191,176,.8);}
.splash-divider{width:160px;height:1px;margin:18px auto;
  background:linear-gradient(90deg,transparent,rgba(43,191,176,.7),transparent);
  animation:fadeUp 1.4s .4s cubic-bezier(.22,1,.36,1) both;}
.splash-tagline{font-size:12.5px;font-weight:400;letter-spacing:5px;
  color:rgba(255,255,255,.55);text-transform:uppercase;text-align:center;
  animation:fadeUp 1.4s .55s cubic-bezier(.22,1,.36,1) both;}
.enter-btn{
  opacity:0;pointer-events:none;margin-top:36px;
  padding:13px 48px;background:linear-gradient(135deg,#2bbfb0,#1a9e8e);
  border:none;border-radius:30px;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:600;
  letter-spacing:.16em;cursor:pointer;
  transition:transform .2s,box-shadow .2s,opacity .5s;
  box-shadow:0 4px 24px rgba(43,191,176,.42);
  animation:fadeUp 1.4s .7s cubic-bezier(.22,1,.36,1) both;
}
.enter-btn.rdy{opacity:1;pointer-events:all;}
.enter-btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(43,191,176,.65);}
.spin-wrap{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);font-size:.78rem;}
.spin-ring{width:30px;height:30px;border:2.5px solid rgba(43,191,176,.18);border-top-color:#2bbfb0;border-radius:50%;animation:sp2 .8s linear infinite;}
@keyframes sp2{to{transform:rotate(360deg)}}

/* ── HEADER ─────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;gap:12px;padding:0 18px;height:58px;
  background:linear-gradient(90deg,#0e2030,var(--navy2));
  border-bottom:2px solid var(--teal);flex-shrink:0;z-index:50;}
.hdr-logo{width:38px;height:38px;flex-shrink:0;}
.hdr-name{font-family:'Rajdhani','Segoe UI',sans-serif;font-size:1.15rem;font-weight:700;
  color:#fff;white-space:nowrap;letter-spacing:.06em;}
.hdr-name .dash{color:var(--teal);}
.hdr-tag{font-size:.6rem;color:var(--muted);white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;}
.hdr-space{flex:1;}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--teal);font-weight:700;letter-spacing:.08em;margin-right:10px;}
.hdr-live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.admin-badge{background:rgba(43,191,176,.18);border:1px solid rgba(43,191,176,.45);
  color:var(--teal);font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;}
.hbtn{padding:7px 16px;border-radius:18px;border:1px solid var(--teal);
  background:transparent;color:var(--teal);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;}
.hbtn:hover{background:var(--teal);color:#fff;}
.hbtn.danger{border-color:var(--red);color:var(--red);}
.hbtn.danger:hover{background:var(--red);color:#fff;}

/* ── NAV ─────────────────────────────────────────────────── */
.nav{display:flex;gap:3px;padding:0 14px;height:44px;align-items:center;
  background:var(--navy2);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;scrollbar-width:thin;}
.nav::-webkit-scrollbar{height:2px;}
.nbtn{padding:5px 13px;border-radius:18px;border:none;background:transparent;
  color:var(--muted);font-size:.74rem;font-weight:600;cursor:pointer;
  transition:all .2s;white-space:nowrap;letter-spacing:.02em;}
.nbtn:hover{background:rgba(43,191,176,.12);color:var(--text);}
.nbtn.act{background:linear-gradient(135deg,var(--teal),var(--teal-dk));
  color:#fff;box-shadow:0 2px 12px rgba(43,191,176,.38);}

/* ── MAIN ─────────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:22px 26px;}
.page{animation:fu .22s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPOGRAPHY ──────────────────────────────────────────── */
.ptitle{font-size:1.5rem;font-weight:700;margin-bottom:5px;
  background:linear-gradient(135deg,#fff 50%,var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pdesc{color:var(--muted);font-size:.84rem;line-height:1.7;margin-bottom:22px;max-width:780px;}

/* ── STAT CARDS ──────────────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.card{background:var(--navy3);border:1px solid var(--border);border-left:3px solid var(--teal);
  border-radius:var(--radius);padding:18px;transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.card.orange{border-left-color:var(--orange);} .card.gold{border-left-color:var(--gold);}
.card.green{border-left-color:var(--green);} .card.red{border-left-color:var(--red);}
.card-icon{font-size:1.6rem;margin-bottom:10px;}
.cl{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.cv{font-size:1.8rem;font-weight:800;color:var(--teal);line-height:1.1;}
.cv.orange{color:var(--orange);} .cv.gold{color:var(--gold);} .cv.green{color:var(--green);} .cv.red{color:var(--red);}
.cs{font-size:.73rem;color:var(--muted);margin-top:5px;line-height:1.4;}

/* ── SECTION CARDS (dashboard) ───────────────────────────── */
.scards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:22px;}
.scard{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--teal),#1b3d60);opacity:0;transition:opacity .2s;}
.scard:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow);}
.scard:hover::before{opacity:1;}
.scard-num{font-size:.65rem;color:var(--teal);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.scard-title{font-size:1rem;font-weight:700;margin-bottom:8px;}
.scard-desc{font-size:.78rem;color:var(--muted);line-height:1.55;}
.scard-arrow{color:var(--teal);font-size:1.1rem;margin-top:12px;}

/* ── CONTENT BLOCK ───────────────────────────────────────── */
.cb{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;}
.cb-title{font-size:.95rem;font-weight:700;margin-bottom:14px;color:var(--teal);}

/* ── HIGHLIGHT BOXES ─────────────────────────────────────── */
.hbox{border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.hbox.teal{background:linear-gradient(135deg,rgba(43,191,176,.1),rgba(43,191,176,.04));border:1px solid rgba(43,191,176,.28);}
.hbox.gold{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.04));border:1px solid rgba(245,166,35,.3);}
.hbox.green{background:linear-gradient(135deg,rgba(77,196,122,.1),rgba(77,196,122,.04));border:1px solid rgba(77,196,122,.3);}
.hbox.red{background:linear-gradient(135deg,rgba(224,85,85,.1),rgba(224,85,85,.04));border:1px solid rgba(224,85,85,.3);}
.hbox.orange{background:linear-gradient(135deg,rgba(237,125,49,.1),rgba(237,125,49,.04));border:1px solid rgba(237,125,49,.3);}
.hbox-title{font-size:.9rem;font-weight:700;margin-bottom:7px;}
.hbox-title.teal{color:var(--teal);} .hbox-title.gold{color:var(--gold);}
.hbox-title.green{color:var(--green);} .hbox-title.red{color:var(--red);} .hbox-title.orange{color:var(--orange);}
.hbox-text{font-size:.83rem;color:var(--muted);line-height:1.7;}

/* ── PROGRESS BARS ───────────────────────────────────────── */
.pr-list{display:flex;flex-direction:column;gap:13px;}
.pr{display:flex;flex-direction:column;gap:5px;}
.pt{display:flex;justify-content:space-between;font-size:.8rem;}
.pb{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-dk));border-radius:3px;}

/* ── LIST ITEMS ──────────────────────────────────────────── */
.li-list{display:flex;flex-direction:column;gap:10px;}
.li{display:flex;gap:13px;align-items:flex-start;padding:13px 15px;
  background:rgba(255,255,255,.025);border-radius:var(--radius-sm);border:1px solid var(--border2);}
.ln{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-dk));
  display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:#fff;}
.ln.orange{background:linear-gradient(135deg,var(--orange),#b55020);}
.ln.gold{background:linear-gradient(135deg,var(--gold),#c09000);}
.ln.green{background:linear-gradient(135deg,var(--green),#2a8050);}
.ln.red{background:linear-gradient(135deg,var(--red),#a02020);}
.ld{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px;}
.lt{font-size:.87rem;font-weight:600;margin-bottom:3px;}
.ld2{font-size:.77rem;color:var(--muted);line-height:1.55;}

/* ── LAYOUT ──────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:720px){.two-col{grid-template-columns:1fr;}.cards{grid-template-columns:1fr 1fr;}}
.divider-line{height:1px;background:var(--border);margin:18px 0;}

/* ── BADGE ───────────────────────────────────────────────── */
.badge{display:inline-block;padding:3px 10px;border-radius:18px;font-size:.67rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.badge-teal{background:rgba(43,191,176,.2);border:1px solid rgba(43,191,176,.4);color:var(--teal);}
.badge-orange{background:rgba(237,125,49,.2);border:1px solid rgba(237,125,49,.4);color:var(--orange);}
.badge-gold{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.4);color:var(--gold);}
.badge-green{background:rgba(77,196,122,.15);border:1px solid rgba(77,196,122,.4);color:var(--green);}
.badge-red{background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.4);color:var(--red);}

/* ── LIVE BAR ────────────────────────────────────────────── */
.live-bar{background:linear-gradient(90deg,rgba(43,191,176,.07),rgba(27,61,96,.07));
  border:1px solid rgba(43,191,176,.22);border-radius:var(--radius-sm);
  padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);animation:blink 1.4s ease-in-out infinite;}
.live-text{font-size:.78rem;color:var(--teal);font-weight:700;letter-spacing:.06em;}
.live-sub{font-size:.72rem;color:var(--muted);margin-left:auto;}

/* ── CONTACT ─────────────────────────────────────────────── */
.contact-row{display:flex;gap:14px;align-items:flex-start;padding:14px;
  background:rgba(255,255,255,.025);border-radius:var(--radius-sm);
  border:1px solid var(--border2);margin-bottom:10px;}
.contact-icon{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),var(--teal-dk));
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.contact-label{font-size:.7rem;color:var(--muted);margin-bottom:3px;}
.contact-val{font-size:.88rem;font-weight:600;}

/* ── VIDEO SYSTEM ────────────────────────────────────────── */
.vid-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.flt{padding:5px 14px;border-radius:18px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;}
.flt:hover{border-color:var(--teal);color:var(--text);}
.flt.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.vid-info{font-size:.72rem;color:var(--muted);margin-left:auto;}
.add-btn{padding:7px 16px;border-radius:18px;background:linear-gradient(135deg,var(--teal),var(--teal-dk));
  border:none;color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;}
.save-new-btn{padding:7px 16px;border-radius:18px;border:1px solid var(--gold);
  background:transparent;color:var(--gold);font-size:.78rem;font-weight:600;cursor:pointer;}
.save-new-btn:hover{background:var(--gold);color:var(--navy);}
.admin-bar{background:rgba(43,191,176,.08);border:1px solid rgba(43,191,176,.22);
  border-radius:var(--radius-sm);padding:10px 16px;display:flex;align-items:center;
  gap:10px;margin-bottom:16px;font-size:.78rem;color:var(--muted);flex-wrap:wrap;}
.admin-bar strong{color:var(--text);}
.admin-notice{font-size:.72rem;color:var(--muted);margin-bottom:14px;padding:8px 12px;
  background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:6px;}
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.vc{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:all .2s;}
.vc:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(43,191,176,.4);}
.vth{position:relative;padding-top:56.25%;background:var(--navy);overflow:hidden;}
.vth video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.po{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.32);transition:background .2s;}
.vc:hover .po{background:rgba(0,0,0,.5);}
.pc{width:48px;height:48px;border-radius:50%;background:rgba(43,191,176,.82);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.tri{width:0;height:0;border-left:18px solid #fff;border-top:11px solid transparent;
  border-bottom:11px solid transparent;margin-left:4px;}
.vi{padding:14px;}
.vti{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.vdesc{font-size:.76rem;color:var(--muted);margin-top:6px;line-height:1.45;}
.vsz{font-size:.68rem;color:var(--muted);margin-top:7px;}
.edit-overlay{position:absolute;top:0;right:0;display:flex;gap:4px;padding:8px;}
.edit-btn-sm{background:rgba(0,0,0,.72);border:1px solid var(--border);color:var(--muted);
  font-size:.68rem;padding:3px 8px;border-radius:6px;cursor:pointer;transition:all .2s;}
.edit-btn-sm:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.edit-btn-sm.del:hover{background:var(--red);border-color:var(--red);}
.page-edit-btn{padding:5px 13px;border-radius:14px;border:1px solid rgba(43,191,176,.4);
  background:transparent;color:var(--teal);font-size:.72rem;cursor:pointer;
  margin-top:6px;transition:all .2s;flex-shrink:0;}
.page-edit-btn:hover{background:var(--teal);color:#fff;}

/* ── MODALS ──────────────────────────────────────────────── */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(4px);}
.mo{background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;width:90%;max-width:500px;box-shadow:var(--shadow);position:relative;}
.mo-title{font-size:1.05rem;font-weight:700;margin-bottom:16px;}
.mo-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.mo-close:hover{border-color:var(--red);color:var(--red);}
.pm{background:var(--navy2);border:1.5px solid var(--teal);border-radius:11px;

.finp{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);

.fsel{width:100%;padding:10px 13px;background:var(--navy3);border:1px solid var(--border);

.ftarea{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1px solid var(--border);

.sp-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin:10px 0;}

.sp-txt{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(43,191,176,.2);

/* ── EDIT PANEL ──────────────────────────────────────────── */
.edit-panel{background:var(--navy4);border:1px solid var(--teal);border-radius:var(--radius);
  padding:18px;margin-bottom:18px;animation:fu .2s ease;}
.ep-title{font-size:.85rem;font-weight:700;color:var(--teal);margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center;}
.ep-actions{display:flex;gap:8px;margin-top:8px;}
.ep-save{padding:8px 20px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--teal-dk));

.ep-cancel{padding:8px 16px;border-radius:16px;border:1px solid var(--border);

.edit-btn-sm.replace{color:var(--teal);}

.replace-drop{border:2px dashed var(--border);border-radius:var(--radius);

.replace-drop:hover{border-color:var(--teal);background:rgba(43,191,176,.04);}

/* ── Phase labels ─────────────────────────────────────────── */
.op-phases{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.op-phase-tab{padding:7px 18px;border-radius:20px;font-size:.75rem;font-weight:700;
  cursor:pointer;transition:all .2s;border:1px solid var(--border);
  background:transparent;color:var(--muted);letter-spacing:.04em;}
.op-phase-tab:hover{border-color:var(--teal);color:var(--text);}
.op-phase-tab.act{background:linear-gradient(135deg,var(--teal),var(--teal-dk));
  border-color:var(--teal);color:#fff;box-shadow:0 2px 14px rgba(43,191,176,.35);}

/* ── Stats row ─────────────────────────────────────────────── */
.op-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.op-stat{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;position:relative;overflow:hidden;}
.op-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--teal),var(--teal-dk));}
.op-stat-val{font-size:1.7rem;font-weight:800;color:var(--teal);line-height:1;}
.op-stat-lbl{font-size:.68rem;color:var(--muted);margin-top:5px;letter-spacing:.06em;text-transform:uppercase;}

/* ── Timeline (SITE ACTIVATION) ─────────────────────────── */
.timeline{position:relative;padding-left:0;}
.tl-item{display:grid;grid-template-columns:56px 1fr;gap:0;margin-bottom:0;position:relative;}
.tl-item:last-child .tl-line{display:none;}
.tl-left{display:flex;flex-direction:column;align-items:center;}
.tl-num{width:42px;height:42px;border-radius:50%;

.tl-line{width:2px;flex:1;min-height:28px;
  background:linear-gradient(180deg,rgba(43,191,176,.5),rgba(43,191,176,.1));
  margin:4px 0;}
.tl-body{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);

.tl-body:hover{border-color:var(--teal);transform:translateX(3px);}
.tl-title{font-size:.92rem;font-weight:700;margin-bottom:5px;color:var(--text);}
.tl-sub{font-size:.78rem;color:var(--muted);line-height:1.6;}
.tl-badge{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:12px;

.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:22px;}
.svc-card{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius-sm);

.svc-icon{font-size:1.4rem;}
.svc-name{font-size:.82rem;font-weight:700;}
.svc-tag{font-size:.68rem;color:var(--muted);}

.fin-bullets li::before{content:'›';position:absolute;left:0;color:var(--teal);}

.kb-list{display:flex;flex-direction:column;gap:8px;}
.kb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;

.ong-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}

.ong-title{font-size:.92rem;font-weight:700;}
.ong-tag{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:12px;font-size:.65rem;font-weight:700;

.ong-body{font-size:.78rem;color:var(--muted);line-height:1.65;}

/* ── Phase section header ──────────────────────────────────── */
.phase-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;margin-top:4px;}

.phase-bar{flex:1;height:2px;background:linear-gradient(90deg,var(--teal),transparent);}

var _fw=[];
function watchV(i){
  var f=S.vidFilter;_fw=f==='All'?S.videos:S.videos.filter(function(v){return v.category===f;});
  S.watchVid=_fw[i];S.modal='watch';_isFSModal=false;R();

function delV(i){
  var f=S.vidFilter;var fl=f==='All'?S.videos:S.videos.filter(function(v){return v.category===f;});
  var v=fl[i];if(!v)return;

  S.videos=S.videos.filter(function(x){return x.id!==v.id;});R();
}

  if(S.modal==='watch')   return renderWatchM();
  if(S.modal==='editvid') return renderEditVidM();
  if(S.modal==='editpage') return '';
  if(S.modal==='replacevid') return renderReplaceVidM();
  return '';
}
function cbg(e){if(e.target.classList.contains('mb'))closeM();}
function closeM(){S.modal=null;S.editVid=null;S.editVidData=null;R();}

function openLogin(){S.modal='login';S.adminPw='';S.adminErr='';R();setTimeout(function(){var e=document.getElementById('pw-inp');if(e)e.focus();},80);}
function pwKey(e){if(e.key==='Enter')doLogin();}
function pwC(v){S.adminPw=v;}
function doLogin(){if(S.adminPw==='IEYE2025'){S.admin=true;S.modal=null;S.adminErr='';R();}else{S.adminErr='Incorrect password.';R();}}
function doLogout(){S.admin=false;R();}
function renderLoginM(){return'<div class="mb" onclick="cbg(event)"><div class="mo" style="max-width:360px;"><button class="mo-close" onclick="closeM()">&#10005;</button><div class="mo-title">&#128272; Admin Login</div><label class="flabel">Password</label><input class="finp" type="password" id="pw-inp" placeholder="Enter admin password" oninput="pwC(this.value)" onkeydown="pwKey(event)">'+(S.adminErr?'<div class="ferr">'+escHtml(S.adminErr)+'</div>':'')+'<button class="fbtn" onclick="doLogin()" style="margin-top:14px;">Login</button></div></div>';}

function openAddVid(){S.modal='addvid';S.nv={title:'',category:'Internal Theft',desc:'',fileName:'',fileObj:null};S.saving=false;S.savePct=0;R();}
function nvC(f,v){S.nv[f]=v;}
function nvFile(inp){var f=inp.files[0];if(!f)return;S.nv.fileObj=f;S.nv.fileName=f.name;if(!S.nv.title)S.nv.title=f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');R();}
function saveV(){
  var t=S.nv.title.trim(),cat=S.nv.category,d=S.nv.desc.trim(),f=S.nv.fileObj;
  if(!t){alert('Enter a title.');return;}if(!f){alert('Select a file.');return;}
  S.saving=true;S.savePct=10;R();
  var p=10,iv=setInterval(function(){p+=Math.random()*7+2;if(p>82)p=82;S.savePct=Math.round(p);var el=document.getElementById('sp-fill');if(el)el.style.width=S.savePct+'%';},220);
  fileToBase64(f).then(function(b64){clearInterval(iv);S.savePct=100;var v={id:Date.now(),title:t,category:cat,desc:d,mime:f.type||'video/mp4',size:f.size,b64:b64,blobUrl:'data:'+(f.type||'video/mp4')+';base64,'+b64,addedAt:new Date().toISOString()};S.videos.unshift(v);S.saving=false;S.modal=null;R();setTimeout(function(){rebuildAndDownload();alert('Video added!\nNew file downloaded \u2014 share with all devices.');},300);}).catch(function(e){clearInterval(iv);S.saving=false;R();alert('Error: '+e.message);});
}
function renderAddVidM(){
  if(S.saving)return'<div class="mb"><div class="mo" style="max-width:420px;"><div class="mo-title">&#127909; Processing&hellip;</div><div class="sp-bar"><div class="sp-fill" id="sp-fill" style="width:'+S.savePct+'%"></div></div><div class="sp-txt"><span class="spin"></span>&nbsp;Converting&hellip; '+S.savePct+'%</div></div></div>';
  var co=CATS.filter(function(c){return c!=='All';}).map(function(c){return'<option value="'+c+'"'+(S.nv.category===c?' selected':'')+'>'+escHtml(c)+'</option>';}).join('');
  return'<div class="mb" onclick="cbg(event)"><div class="mo" style="max-width:480px;"><button class="mo-close" onclick="closeM()">&#10005;</button><div class="mo-title">&#127909; Add Video</div><label class="flabel">Title *</label><input class="finp" type="text" value="'+escAttr(S.nv.title)+'" placeholder="Video title" oninput="nvC(\'title\',this.value)"><label class="flabel">Category</label><select class="fsel" onchange="nvC(\'category\',this.value)">'+co+'</select><label class="flabel">Description</label><textarea class="ftarea" placeholder="Optional" oninput="nvC(\'desc\',this.value)">'+escHtml(S.nv.desc)+'</textarea><label class="flabel">File *</label><input type="file" accept="video/*" onchange="nvFile(this)" style="color:var(--muted);font-size:.82rem;margin-bottom:12px;">'+(S.nv.fileName?'<div style="font-size:.75rem;color:var(--green);margin-bottom:10px;">&#10003; '+escHtml(S.nv.fileName)+'</div>':'')+'<button class="fbtn" onclick="saveV()">&#10133; Add &amp; Download</button></div></div>';
}

function renderEditVidM(){var d=S.editVidData;if(!d)return'';var co=CATS.filter(function(c){return c!=='All';}).map(function(c){return'<option value="'+c+'"'+(d.category===c?' selected':'')+'>'+escHtml(c)+'</option>';}).join('');return'<div class="mb" onclick="cbg(event)"><div class="mo" style="max-width:480px;"><button class="mo-close" onclick="closeM()">&#10005;</button><div class="mo-title">&#9998; Edit Video</div><label class="flabel">Title</label><input class="finp" type="text" value="'+escAttr(d.title)+'" oninput="eVF(\'title\',this.value)"><label class="flabel">Category</label><select class="fsel" onchange="eVF(\'category\',this.value)">'+co+'</select><label class="flabel">Description</label><textarea class="ftarea" oninput="eVF(\'desc\',this.value)">'+escHtml(d.desc)+'</textarea><button class="fbtn" onclick="saveEVid()">&#10003; Save</button></div></div>';}

function renderWatchM(){
  var v=S.watchVid;if(!v)return'';
  return'<div class="mb" onclick="cbg(event)"><div class="pm" id="vid-pm"><div class="ph"><h3>'+escHtml(v.title)+'</h3><div class="ph-btns"><button class="fsb" onclick="toggleFS()" title="Fullscreen">&#9974;</button><button class="xb" onclick="closeM()">&#215;</button></div></div>'
    +'<div class="pw"><video id="vid-player" src="'+v.blobUrl+'" controls autoplay style="width:100%;display:block;background:#000;border-radius:8px;max-height:72vh;" controlsList="nodownload" onvolumechange="saveVol(this)"></video></div>'
    +'<div class="vid-meta"><span class="badge '+catClass(v.category)+'">'+escHtml(v.category)+'</span>'+(v.desc?'<span style="font-size:.78rem;color:var(--muted);">'+escHtml(v.desc)+'</span>':'')+(v.size?'<span style="font-size:.75rem;color:var(--muted);">&#128230; '+fmtSize(v.size)+'</span>':'')+'<span style="margin-left:auto;font-size:.68rem;color:var(--muted);">&#9974; fullscreen</span></div></div></div>';
}

function toggleFS(){var pm=document.getElementById('vid-pm'),vid=document.getElementById('vid-player');if(!pm||!vid)return;if(!_isFSModal){if(vid.requestFullscreen)vid.requestFullscreen();else if(vid.webkitRequestFullscreen)vid.webkitRequestFullscreen();else if(vid.mozRequestFullScreen)vid.mozRequestFullScreen();else{pm.classList.add('is-fs');vid.style.maxHeight='none';_isFSModal=true;}}else{pm.classList.remove('is-fs');vid.style.maxHeight='72vh';_isFSModal=false;}}
function saveVol(el){_savedVol=el.volume;}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(_isFSModal){var pm=document.getElementById('vid-pm');if(pm){pm.classList.remove('is-fs');_isFSModal=false;}}else if(S.modal)closeM();}});
document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement&&_isFSModal){var pm=document.getElementById('vid-pm');if(pm){pm.classList.remove('is-fs');_isFSModal=false;}}});

function fileToBase64(file){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result.split(',')[1]);};fr.onerror=function(){rej(fr.error);};fr.readAsDataURL(file);});}

function openReplaceVid(id){
  S.replaceVidId = id;
  S.modal = 'replacevid';
  S.saving = false;
  S.savePct = 0;
  R();
}

function renderReplaceVidM(){
  var v = S.videos.find(function(x){ return String(x.id)===String(S.replaceVidId); });
  if(!v) return '';
  if(S.saving){
    return '<div class="mb"><div class="mo" style="max-width:440px;">'
      +'<div class="mo-title">&#8635; Replacing Video&hellip;</div>'
      +'<div style="font-size:.82rem;color:var(--muted);margin-bottom:12px;">Replacing: <strong style="color:var(--text)">'+escHtml(v.title)+'</strong></div>'
      +'<div class="sp-bar"><div class="sp-fill" id="sp-fill" style="width:'+S.savePct+'%"></div></div>'
      +'<div class="sp-txt"><span class="spin"></span>&nbsp;Converting new video&hellip; '+S.savePct+'%</div>'
      +'</div></div>';
  }
  return '<div class="mb" onclick="cbg(event)">'
    +'<div class="mo" style="max-width:520px;">'
    +'<button class="mo-close" onclick="closeM()">&#10005;</button>'
    +'<div class="mo-title">&#8635; Replace Video File</div>'
    // Current video info box
    +'<div style="background:rgba(43,191,176,.07);border:1px solid rgba(43,191,176,.2);border-radius:8px;padding:14px;margin-bottom:18px;">'
    +'<div style="font-size:.7rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Replacing</div>'
    +'<div style="font-size:.92rem;font-weight:700;margin-bottom:4px;">'+escHtml(v.title)+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center;">'
    +'<span class="badge '+catClass(v.category)+'">'+escHtml(v.category)+'</span>'
    +'<span style="font-size:.72rem;color:var(--muted);">&#128230; '+fmtSize(v.size)+'</span>'
    +'</div>'
    +'<div style="font-size:.72rem;color:var(--muted);margin-top:6px;">&#8505; Title, category and description will be preserved</div>'
    +'</div>'
    // New file picker
    +'<label class="flabel">Select New Video File *</label>'
    +'<input type="file" id="replace-file-inp" accept="video/*" onchange="handleReplaceFile(this)" '
    +'style="color:var(--muted);font-size:.82rem;margin-bottom:14px;width:100%;">'
    +'<div id="replace-file-info" style="display:none;background:rgba(77,196,122,.08);border:1px solid rgba(77,196,122,.25);border-radius:6px;padding:10px;margin-bottom:14px;">'
    +'<div style="font-size:.72rem;color:var(--green);font-weight:700;margin-bottom:3px;">&#10003; New file selected</div>'
    +'<div id="replace-file-name" style="font-size:.82rem;"></div>'
    +'<div id="replace-file-size" style="font-size:.72rem;color:var(--muted);margin-top:3px;"></div>'
    +'</div>'
    +'<button class="fbtn" id="replace-confirm-btn" onclick="confirmReplace()" style="opacity:.4;pointer-events:none;">&#8635; Replace &amp; Download Updated File</button>'
    +'</div></div>';
}

function handleReplaceFile(input){
  var f = input.files[0];
  if(!f) return;
  var info = document.getElementById('replace-file-info');
  var nm = document.getElementById('replace-file-name');
  var sz = document.getElementById('replace-file-size');
  var btn = document.getElementById('replace-confirm-btn');
  if(info){ info.style.display='block'; }
  if(nm){ nm.textContent = f.name; }
  if(sz){ sz.textContent = fmtSize(f.size); }
  if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='all'; }
  // store ref on window to avoid state re-render
  window._replaceFile = f;
}

function confirmReplace(){
  var f = window._replaceFile;
  if(!f){ alert('Please select a file first.'); return; }
  var vid = S.videos.find(function(x){ return String(x.id)===String(S.replaceVidId); });
  if(!vid) return;
  S.saving=true; S.savePct=10; R();
  var prog=10;
  var iv=setInterval(function(){
    prog+=Math.random()*7+2; if(prog>82)prog=82; S.savePct=Math.round(prog);
    var el=document.getElementById('sp-fill'); if(el) el.style.width=S.savePct+'%';
  },220);
  fileToBase64(f).then(function(b64){
    clearInterval(iv); S.savePct=100;
    S.videos = S.videos.map(function(v){
      if(String(v.id)===String(S.replaceVidId)){
        return Object.assign({},v,{
          mime: f.type||'video/mp4',
          size: f.size,
          b64: b64,
          blobUrl: 'data:'+(f.type||'video/mp4')+';base64,'+b64,
          replacedAt: new Date().toISOString()
        });
      }
      return v;
    });
    S.saving=false; S.modal=null; S.replaceVidId=null;
    window._replaceFile=null;
    R();
    setTimeout(function(){
      rebuildAndDownload();
      alert('Video replaced!\n\nNew IEYE-App.html downloaded — share with all devices.');
    },300);
  }).catch(function(err){
    clearInterval(iv); S.saving=false; R();
    alert('Error: '+err.message);
  });
}

function rebuildAndDownload(){var data=S.videos.map(function(v){return{id:v.id,title:v.title,category:v.category,desc:v.desc||'',mime:v.mime||'video/mp4',size:v.size||0,b64:v.b64||'',addedAt:v.addedAt||''};});var src=document.documentElement.outerHTML;var ns=src.replace(/const __VDATA__ = \[[\s\S]*?\];/,'const __VDATA__ = '+JSON.stringify(data)+';');var blob=new Blob([ns],{type:'text/html;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='IEYE-App.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(a.href);},5000);}
</script>
